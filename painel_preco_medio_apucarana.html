<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Preço Médio · Apucarana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#16202E; --muted:#67768A; --line:#E4E9F0;
  --surface:#EEF2F7; --card:#FFFFFF;
  --primary:#1F4E78; --primary-d:#15324F;
  --amber:#E0922B; --amber-soft:#FBEFD9;
  --green:#1F9D62; --green-soft:#E2F4EA;
  --red:#C2543D; --red-soft:#F8E6E1;
  --shadow:0 1px 2px rgba(20,40,70,.05),0 6px 22px rgba(20,40,70,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--surface);color:var(--ink);
  font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;padding-bottom:48px}
.wrap{max-width:1080px;margin:0 auto;padding:0 16px}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* Header */
header{background:linear-gradient(135deg,var(--primary-d),var(--primary));color:#fff;
  padding:22px 0 22px;position:relative;overflow:hidden}
header::after{content:"";position:absolute;right:-60px;top:-60px;width:260px;height:260px;
  background:radial-gradient(circle,rgba(224,146,43,.22),transparent 70%);pointer-events:none}
.brand{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
.brand h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:21px;letter-spacing:-.4px}
.brand .tag{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:#9FC2E0;background:rgba(255,255,255,.08);padding:3px 9px;border-radius:99px}
.sub{color:#BBD2E6;font-size:12.5px;margin-top:5px}

/* KPI strip */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:20px;position:relative;z-index:1}
.kpi{background:var(--card);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);color:var(--ink)}
.kpi .lab{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.kpi .val{font-family:'Archivo',sans-serif;font-weight:700;font-size:23px;margin-top:3px;letter-spacing:-.5px}
.kpi .val small{font-size:13px;font-weight:600;color:var(--muted)}

/* Tabs */
.tabs{display:flex;gap:6px;margin:22px 0 16px;background:#E0E7F0;padding:5px;border-radius:12px;width:fit-content}
.tab{border:0;background:transparent;font-family:'Inter';font-weight:600;font-size:13.5px;color:var(--muted);
  padding:8px 18px;border-radius:8px;cursor:pointer;transition:.15s}
.tab.on{background:var(--card);color:var(--primary);box-shadow:0 1px 3px rgba(20,40,70,.12)}

/* Controls */
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
select,input[type=text]{font-family:'Inter';font-size:14px;color:var(--ink);background:var(--card);
  border:1px solid var(--line);border-radius:10px;padding:10px 12px;outline:none;transition:.15s}
select:focus,input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(31,78,120,.12)}
select{min-width:230px;cursor:pointer}
input[type=text]{flex:1;min-width:180px}
.hint{font-size:12px;color:var(--muted)}

/* Vendor summary */
.vsum{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.vsum .box{background:var(--card);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);border-left:3px solid var(--primary)}
.vsum .box.amber{border-left-color:var(--amber)}
.vsum .box .lab{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.vsum .box .v{font-family:'Archivo';font-weight:700;font-size:18px;margin-top:2px}

/* Table */
.tablecard{background:var(--card);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);
  text-align:left;padding:12px 14px;background:#F7F9FC;border-bottom:1px solid var(--line);cursor:pointer;user-select:none;white-space:nowrap}
thead th.r{text-align:right}
thead th .ar{opacity:.4;font-size:9px;margin-left:3px}
thead th.act .ar{opacity:1;color:var(--primary)}
tbody td{padding:11px 14px;border-bottom:1px solid #F0F3F7;vertical-align:middle}
tbody tr:last-child td{border-bottom:0}
tbody tr:hover{background:#FAFCFE}
.prow{cursor:pointer}
.prow:hover{background:#F4F8FC}
.prow.open{background:#EEF5FC}
.prod{font-weight:500;font-size:13px;line-height:1.3;max-width:420px;display:flex;gap:7px;align-items:flex-start}
.chev{color:var(--primary);font-size:12px;line-height:1.5;transition:transform .15s;flex:none}
.prow.open .chev{transform:rotate(90deg)}
/* painel de detalhe */
.drow>td{padding:0 !important;background:#F7FAFD;border-bottom:1px solid var(--line)}
.detail{padding:6px 14px 14px 35px}
.dhead{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--primary);padding:10px 2px 8px}
.dscroll{max-height:280px;overflow:auto;border:1px solid var(--line);border-radius:10px;background:var(--card)}
.dtab{width:100%;border-collapse:collapse;font-size:12.5px}
.dtab thead th{position:sticky;top:0;background:#EEF3F9;color:var(--muted);font-size:10px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:8px 12px;border-bottom:1px solid var(--line);white-space:nowrap;cursor:default}
.dtab thead th.r{text-align:right}
.dtab tbody td{padding:8px 12px;border-bottom:1px solid #F0F3F7}
.dtab tbody tr:last-child td{border-bottom:0}
.dtab tbody tr:hover{background:#F9FCFE}
.day-total{background:#EEF3F9}
.day-total td{padding:6px 12px;font-weight:700;font-size:12px;border-top:1px solid var(--line);border-bottom:2px solid #D0DCE9}
.day-label{color:var(--primary);text-transform:uppercase;font-size:10.5px;letter-spacing:.05em}
.d-op{font-weight:700;color:var(--primary);white-space:nowrap;font-variant-numeric:tabular-nums}
.d-cli{font-weight:500;min-width:180px}
.d-data{color:var(--muted);white-space:nowrap}
.r{text-align:right}
.price{font-family:'Archivo';font-weight:700;font-size:15px}
.bar{height:6px;border-radius:99px;background:#EDF1F6;margin-top:5px;overflow:hidden;min-width:60px}
.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--amber),#F0B257)}
.pill{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:99px}
.muted{color:var(--muted);font-size:12.5px}
.empty{padding:40px;text-align:center;color:var(--muted)}

/* Product comparison */
.cmp{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:18px}
.cmp h3{font-family:'Archivo';font-size:16px;font-weight:700;line-height:1.3;margin-bottom:4px}
.cmp .meta{display:flex;gap:18px;flex-wrap:wrap;margin:12px 0 18px;padding-bottom:16px;border-bottom:1px solid var(--line)}
.cmp .meta div .l{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.cmp .meta div .n{font-family:'Archivo';font-weight:700;font-size:18px;margin-top:1px}
.row{display:grid;grid-template-columns:170px 1fr auto;gap:12px;align-items:center;padding:7px 0}
.row .nm{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rowmid{display:flex;flex-direction:column;gap:3px}
.vol{font-size:11px;margin-top:1px}
.track{position:relative;height:18px;background:#F2F5F9;border-radius:6px;overflow:hidden}
.track i{position:absolute;left:0;top:0;height:100%;border-radius:6px;opacity:.9}
.avgline{position:absolute;top:0;bottom:0;width:2px;background:var(--ink);z-index:10;pointer-events:none}
.avgtag{position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:9.5px;font-weight:700;color:var(--ink);white-space:nowrap}
.row .pr{font-family:'Archivo';font-weight:700;font-size:14px;text-align:right;min-width:62px}
.dlt{font-size:10.5px;font-weight:700;margin-left:6px}
.above-g{color:var(--green)} .below-r{color:var(--red)}
.vstab{font-size:11px;font-weight:700;margin-left:8px;vertical-align:middle}
.vstab-sm{font-size:10.5px;font-weight:700;margin-top:2px}
.ptab-val{color:var(--muted)}
.prow-cmp.clickable{cursor:pointer;border-radius:8px;transition:background .12s}
.prow-cmp.clickable:hover{background:#F4F8FC}
.prow-cmp.open{background:#EEF5FC}
.crow-detail{background:#F7FAFD;border-radius:0 0 10px 10px;margin-top:-4px;margin-bottom:6px}
@media(max-width:720px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .vsum{grid-template-columns:repeat(2,1fr)}
  .row{grid-template-columns:110px 1fr auto;gap:8px}
  .row .nm{font-size:12px}
  .prod{max-width:200px}
  thead th.hidem,tbody td.hidem{display:none}
}
.foot{margin-top:24px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.6}
/* Barra de gestores */
.gest-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.gest-lab{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-right:2px}
.gbtn{border:1.5px solid var(--line);background:var(--card);font-family:'Inter';font-size:13px;font-weight:600;
  color:var(--muted);padding:7px 16px;border-radius:99px;cursor:pointer;transition:.15s}
.gbtn:hover{border-color:var(--primary);color:var(--primary)}
.gbtn.on{background:var(--primary);border-color:var(--primary);color:#fff}
</style>
</head>

    <div class="controls">
      <input type="text" id="qProd" placeholder="Filtrar produto…" style="min-width:220px">
      <select id="selProd"></select>
    </div>
    <div class="cmp" id="cmp"></div>
  </section>

  <div class="foot" id="foot"></div>
</div>

const fmtK = n => n>=1e6? 'R$ '+(n/1e6).toLocaleString('pt-BR',{maximumFractionDigits:2})+' mi'
                 : n>=1e3? 'R$ '+(n/1e3).toLocaleString('pt-BR',{maximumFractionDigits:0})+' mil'
                 : fmtBRL(n);

document.getElementById('sub').textContent = DB.periodo + ' · ' + DB.filtro;

/* ---------- GESTORES ---------- */
const GESTORES = {
  'Miguel':   ['Alessandra Borgato','Juliana Castro Nascimento','Leonardo Tortola','Luiz Henrique Dos Santos','Luiz Mauro Pedroso'],
  'Rafael':   ['Alexandre Constantin Flores','Alexandre Rodrigues De Andrade','Fernando Henrique Rizzatto Neto','Jaime Roberto Orlandelli','Jonatas Wesley Rodrigues','Maicon Douglas Karpovicz','Tiago Fernando Radin'],
  'Leonardo': ['Arieli Perasoli','Fabio Morgado','Joao Vitor Arenas Marcato','Marcos Roney Fernandes','Matheus Augusto Linjardi','Maycon Rodrigo Pupulin','Octavio Augusto Ferreira','Rodrigo Glauber Zacarias','Sergio Fabiano Neiverth'],
};
// mapeia parcialmente: verifica se o nome do vendor contém qualquer parte do nome do gestor
function vendorInGestor(vName, gestor){
  if(gestor==='todos') return true;
  const lista = GESTORES[gestor];
  const vl = vName.toLowerCase();
  return lista.some(n => {
    const nl = n.toLowerCase();
    // match se o nome do vendor começa com as primeiras palavras do nome da lista
    const parts = nl.split(' ');
    return parts.slice(0,2).every(w => vl.includes(w));
  });
}
let gestorVend='todos', gestorProd='todos';

// botões aba vendedor
document.querySelectorAll('#gestV .gbtn').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#gestV .gbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); gestorVend=b.dataset.g;
  rebuildSelVend(); renderVendor();
});
// botões aba produto
document.querySelectorAll('#gestP .gbtn').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#gestP .gbtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); gestorProd=b.dataset.g;
  renderProd();
});
document.getElementById('foot').innerHTML =
  'Preço médio ponderado pela quantidade (faturamento ÷ volume). '+DB.totals.nops.toLocaleString('pt-BR')+
  ' oportunidades · '+DB.filtro+'.<br>Gerado a partir do Relatório de Vendas Apucarana.';

// KPIs
const T=DB.totals;
document.getElementById('kpis').innerHTML = [
  ['Faturamento', fmtK(T.fat)],
  ['Volume', fmtN(T.qtd)+' <small>kg</small>'],
  ['Vendedores', T.nvend],
  ['Produtos', T.nprod],
].map(([l,v])=>`<div class="kpi"><div class="lab">${l}</div><div class="val num">${v}</div></div>`).join('');

/* ---------- TABS ---------- */
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  const t=b.dataset.t;
  document.getElementById('view-vend').style.display = t==='vend'?'':'none';
  document.getElementById('view-prod').style.display = t==='prod'?'':'none';
});

/* ---------- POR VENDEDOR ---------- */
const vendNames = Object.keys(DB.vendors).sort((a,b)=>a.localeCompare(b,'pt-BR'));
const selV = document.getElementById('selVend');

function rebuildSelVend(){
  const filtered = vendNames.filter(v=>vendorInGestor(v, gestorVend));
  selV.innerHTML = filtered.map(v=>`<option value="${v}">${v} — ${fmtK(DB.vendors[v].fat)}</option>`).join('');
}
rebuildSelVend();
let sortKey='fat', sortDir=-1;

function renderVendor(){
  const v = selV.value, d = DB.vendors[v];
  const q = document.getElementById('qVend').value.trim().toLowerCase();
  document.getElementById('vsum').innerHTML = [
    ['Faturamento', fmtK(d.fat), ''],
    ['Volume', fmtN(d.qtd)+' kg', ''],
    ['Produtos', d.nprod, ''],
    ['Preço médio geral', fmtBRL(d.pmed), 'amber'],
  ].map(([l,val,c])=>`<div class="box ${c}"><div class="lab">${l}</div><div class="v num">${val}</div></div>`).join('');

  let items = d.items.filter(it=>!q || it.produto.toLowerCase().includes(q));
  items = items.slice().sort((a,b)=>{
    let A=a[sortKey],B=b[sortKey];
    if(sortKey==='produto'){A=A.toLowerCase();B=B.toLowerCase();return A<B?-sortDir:A>B?sortDir:0;}
    return (A-B)*sortDir;
  });
  const maxP = Math.max(...d.items.map(i=>i.pmed),0.0001);
  const tb=document.getElementById('vbody');
  if(!items.length){tb.innerHTML='<tr><td colspan="6" class="empty">Nenhum produto encontrado.</td></tr>';return;}
  tb.innerHTML = items.map((it,idx)=>{
    // agrupa OPs por data com subtotal
    const byDay = {};
    it.rows.forEach(o=>{ (byDay[o.data||'—']??=[]).push(o); });
    const det = Object.entries(byDay).map(([data,ops])=>{
      const totalQtd = ops.reduce((s,o)=>s+o.qtd,0);
      const totalFat = ops.reduce((s,o)=>s+o.fat,0);
      const rows = ops.map(o=>`
        <tr>
          <td class="d-op">${o.op}</td>
          <td class="d-cli">${esc(o.cli)}</td>
          <td class="d-data num">${o.data||''}</td>
          <td class="r num">${fmtN(o.qtd)}</td>
          <td class="r num">${fmtBRL(o.pv)}</td>
          <td class="r num">${fmtBRL(o.fat)}</td>
        </tr>`).join('');
      return rows + `
        <tr class="day-total">
          <td colspan="3" class="day-label">Total ${data}</td>
          <td class="r num">${fmtN(totalQtd)}</td>
          <td></td>
          <td class="r num">${fmtBRL(totalFat)}</td>
        </tr>`;
    }).join('');
    const pt=it.ptab||0;
    const dl=pt?(it.pmed-pt):null;
    const dlTag=dl!==null?`<div class="vstab-sm ${dl>=0?'above-g':'below-r'}">${dl>=0?'+':''}${fmtBRL(dl)}</div>`:'';
    return `
    <tr class="prow" data-idx="${idx}">
      <td><div class="prod"><span class="chev">▸</span>${it.produto}</div></td>
      <td class="r num muted">${fmtN(it.qtd)}</td>
      <td class="r num">${fmtBRL(it.fat)}</td>
      <td class="r num muted">${pt?fmtBRL(pt):'—'}</td>
      <td class="r">
        <div class="price num">${fmtBRL(it.pmed)}</div>
        ${dlTag}
        <div class="bar"><i style="width:${(it.pmed/maxP*100).toFixed(1)}%"></i></div>
      </td>
      <td class="r num muted hidem">${it.ops}</td>
    </tr>
    <tr class="drow" data-for="${idx}" hidden><td colspan="6">
      <div class="detail">
        <div class="dhead">${it.ops} oportunidade${it.ops>1?'s':''} · ${it.produto}</div>
        <div class="dscroll"><table class="dtab">
          <thead><tr>
            <th>Nº da OP</th><th>Cliente</th><th>Data</th>
            <th class="r">Qtd</th><th class="r">Preço venda</th><th class="r">Faturamento</th>
          </tr></thead>
          <tbody>${det}</tbody>
        </table></div>
      </div>
    </td></tr>`;}).join('');
}
// expandir/recolher ao clicar na linha do produto
document.getElementById('vbody').addEventListener('click',e=>{
  const tr=e.target.closest('.prow'); if(!tr) return;
  const idx=tr.dataset.idx;
  const dr=document.querySelector(`#vbody .drow[data-for="${idx}"]`);
  const open=tr.classList.toggle('open');
  if(dr) dr.hidden=!open;
});
document.querySelectorAll('#view-vend thead th').forEach(th=>th.onclick=()=>{
  const k=th.dataset.s;
  if(sortKey===k) sortDir*=-1; else {sortKey=k; sortDir = k==='produto'?1:-1;}
  document.querySelectorAll('#view-vend thead th').forEach(x=>{x.classList.remove('act');x.querySelector('.ar').textContent='';});
  th.classList.add('act'); th.querySelector('.ar').textContent = sortDir<0?'▼':'▲';
  renderVendor();
});
selV.onchange=renderVendor;
document.getElementById('qVend').oninput=renderVendor;
renderVendor();

/* ---------- COMPARAR PRODUTO ---------- */
const prodNames = Object.keys(DB.products).sort((a,b)=>a.localeCompare(b,'pt-BR'));
const selP=document.getElementById('selProd');

function rebuildSelProd(){
  const q=document.getElementById('qProd').value.trim().toLowerCase();
  const filtered=prodNames.filter(p=>!q||p.toLowerCase().includes(q));
  selP.innerHTML=filtered.map(p=>`<option value="${p}">${p}</option>`).join('');
  renderProd();
}
document.getElementById('qProd').oninput=rebuildSelProd;
rebuildSelProd();

function renderProd(){
  const p=selP.value, d=DB.products[p];
  const allSellers = d.sellers.filter(s=>vendorInGestor(s.vend, gestorProd));
  const sellers=allSellers.slice().sort((a,b)=>a.pmed-b.pmed);
  if(!sellers.length){document.getElementById('cmp').innerHTML='<div class="empty" style="padding:40px;text-align:center;color:var(--muted)">Nenhum vendedor desta equipe vendeu este produto no período.</div>';return;}
  const min=Math.min(...sellers.map(s=>s.pmed)), max=Math.max(...sellers.map(s=>s.pmed));
  const avg = sellers.reduce((a,s)=>a+s.fat,0) / sellers.reduce((a,s)=>a+s.qtd,0);
  const fat = sellers.reduce((a,s)=>a+s.fat,0);
  const qtd = sellers.reduce((a,s)=>a+s.qtd,0);
  const scaleMax=max*1.04;
  const avgPct=(avg/scaleMax*100).toFixed(3);
  const rows = sellers.map((s,idx)=>{
    const w=(s.pmed/scaleMax*100).toFixed(3);
    const dl=s.pmed-avg, below=dl<-0.004, above=dl>0.004;
    const col = above?'var(--green)':below?'var(--red)':'var(--primary)';
    const dtag = Math.abs(dl)<0.005?'':`<span class="dlt ${above?'above-g':'below-r'}">${dl>0?'+':''}${fmtBRL(dl)}</span>`;
    // buscar OPs do vendedor para este produto
    const vdata = DB.vendors[s.vend];
    const itemOps = vdata ? (vdata.items.find(it=>it.produto===p)||{rows:[]}).rows : [];
    // agrupa por data com subtotal
    const byDay = {};
    itemOps.forEach(o=>{ (byDay[o.data||'—']??=[]).push(o); });
    const detRows = Object.entries(byDay).map(([data,ops])=>{
      const tQtd=ops.reduce((s,o)=>s+o.qtd,0), tFat=ops.reduce((s,o)=>s+o.fat,0);
      return ops.map(o=>`
        <tr>
          <td class="d-op">${o.op}</td>
          <td class="d-cli">${esc(o.cli)}</td>
          <td class="d-data num">${o.data||''}</td>
          <td class="r num">${fmtN(o.qtd)}</td>
          <td class="r num">${fmtBRL(o.pv)}</td>
          <td class="r num">${fmtBRL(o.fat)}</td>
        </tr>`).join('') + `
        <tr class="day-total">
          <td colspan="3" class="day-label">Total ${data}</td>
          <td class="r num">${fmtN(tQtd)}</td>
          <td></td>
          <td class="r num">${fmtBRL(tFat)}</td>
        </tr>`;
    }).join('');
    const hasOps = itemOps.length > 0;
    return `<div class="row prow-cmp ${hasOps?'clickable':''}" data-cidx="${idx}">
      <div class="nm" title="${s.vend}"><span class="chev" style="${hasOps?'':'visibility:hidden'}"">▸</span>${s.vend}</div>
      <div class="rowmid">
        <div class="track"><i style="width:${w}%;background:${col}"></i></div>
        <div class="vol num muted">${fmtN(s.qtd)} kg</div>
      </div>
      <div class="pr num">${fmtBRL(s.pmed)}${dtag}</div>
    </div>
    ${hasOps?`<div class="crow-detail" data-cfor="${idx}" hidden>
      <div class="detail">
        <div class="dhead">${itemOps.length} oportunidade${itemOps.length>1?'s':''} · ${s.vend}</div>
        <div class="dscroll"><table class="dtab">
          <thead><tr>
            <th>Nº da OP</th><th>Cliente</th><th>Data</th>
            <th class="r">Qtd</th><th class="r">Preço venda</th><th class="r">Faturamento</th>
          </tr></thead>
          <tbody>${detRows}</tbody>
        </table></div>
      </div>
    </div>`:''}`;
  }).join('');
  const ptab = d.ptab || 0;
  const vsTab = ptab ? avg - ptab : null;
  const vsTabTag = vsTab !== null
    ? `<span class="vstab ${vsTab>=0?'above-g':'below-r'}">${vsTab>=0?'+':''}${fmtBRL(vsTab)} vs tabela</span>`
    : '';
  document.getElementById('cmp').innerHTML = `
    <h3>${p}</h3>
    <div class="meta">
      <div>
        <div class="l">Preço médio equipe</div>
        <div class="n num">${fmtBRL(avg)} ${vsTabTag}</div>
      </div>
      <div><div class="l">Preço de tabela</div><div class="n num ptab-val">${ptab?fmtBRL(ptab):'—'}</div></div>
      <div><div class="l">Volume total</div><div class="n num">${fmtN(qtd)} kg</div></div>
      <div><div class="l">Faturamento</div><div class="n num">${fmtBRL(fat)}</div></div>
      <div><div class="l">Vendedores</div><div class="n num">${sellers.length}</div></div>
      <div><div class="l">Amplitude de preço</div><div class="n num">${fmtBRL(min)}–${fmtBRL(max)}</div></div>
    </div>
    <div class="rows-wrap" id="rows-wrap" style="position:relative">
      <div class="avgline" id="avgline"><div class="avgtag">média ${fmtBRL(avg)}</div></div>
      ${rows}
    </div>
    <div class="muted" style="margin-top:14px">Barras <span style="color:var(--green);font-weight:700">verdes</span> = acima da média da equipe (preço mais alto) · <span style="color:var(--red);font-weight:700">vermelhas</span> = abaixo.</div>`;
  // posiciona a linha após render
  requestAnimationFrame(()=>{
    const wrap = document.getElementById('rows-wrap');
    const track = wrap ? wrap.querySelector('.track') : null;
    const line = document.getElementById('avgline');
    if(track&&line){
      const wr=wrap.getBoundingClientRect(), tr=track.getBoundingClientRect();
      line.style.left = (tr.left-wr.left+tr.width*(avgPct/100))+'px';
    }
  });
}
selP.onchange=renderProd;
// listener fixo de expansão no comparar produto (delegado, sobrevive ao re-render)
document.getElementById('view-prod').addEventListener('click',e=>{
  const row=e.target.closest('.prow-cmp.clickable'); if(!row) return;
  const idx=row.dataset.cidx;
  const cmp=document.getElementById('cmp');
  const det=cmp.querySelector(`.crow-detail[data-cfor="${idx}"]`);
  const open=row.classList.toggle('open');
  const chev=row.querySelector('.chev');
  if(chev) chev.style.transform=open?'rotate(90deg)':'';
  if(det) det.hidden=!open;
});
renderProd();
</script>
